name: Deploy to GitHub Pages

on:
  # mainブランチに変更がpushされたとき
  push:
    branches: ["main"]
  # 手動デプロイも可能にする
  workflow_dispatch:

# GITHUB_TOKENの権限を設定
permissions:
  contents: read
  pages: write
  id-token: write

# 複数デプロイが同時に走らないようにする
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build
        run: npm run build
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # VercelやGitHub Pages向けビルドの出力先を指定
          path: './dist'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
